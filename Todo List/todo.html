<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List | Task 2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #151515;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .container {
            background-color: #222222;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            border-radius: 1rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border-top: 4px solid #FF650D;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header h2 {
            color: #fff;
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .input-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .row1 {
            width: 100%;
            display: flex;
            gap: 8px;
        }

        .row1 input {
            padding: 0.8rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: #151515;
            color: #fff;
            border-radius: 0.5rem;
            width: 100%;
            font-size: 1rem;
            transition: 0.2s ease;
        }

        .row1 input:focus {
            outline: none;
            border-color: #FF650D;
        }

        button {
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .add {
            background-color: #FF650D;
            color: white;
            padding: 0 1.5rem;
        }

        .add:hover {
            background-color: #e05500;
            transform: translateY(-2px);
        }

        .clear {
            padding: 0.8rem;
            width: 100%;
            background-color: transparent;
            color: #ff4757;
            border: 1px solid #ff4757;
        }

        .clear:hover {
            background-color: #ff4757;
            color: white;
        }

        .task-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .task-section::-webkit-scrollbar {
            width: 6px;
        }
        .task-section::-webkit-scrollbar-thumb {
            background-color: rgba(255, 101, 13, 0.5);
            border-radius: 10px;
        }

        .task {
            width: 100%;
            padding: 1rem;
            background-color: #151515;
            border-radius: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            border-left: 3px solid transparent;
            transition: 0.2s ease;
        }

        .task:hover {
            border-left-color: #FF650D;
        }

        .task p {
            color: #fff;
            font-size: 1rem;
            width: 60%;
            word-wrap: break-word;
        }

        .task p.done-text {
            text-decoration: line-through;
            color: #aaa;
        }

        .task .buttons {
            display: flex;
            gap: 6px;
        }

        .task .done {
            background-color: #2ed573;
            color: white;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }
        .task .done:hover { background-color: #27ae60; }

        .task .edit {
            background-color: #f39c12;
            color: white;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }
        .task .edit:hover { background-color: #d68910; }

        .task .delete {
            background-color: #ff4757;
            color: white;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }
        .task .delete:hover { background-color: #e84118; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: #222222;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 400px;
            border-top: 4px solid #FF650D;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateY(-20px);
            transition: 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-content h3 {
            color: #fff;
            margin-bottom: 1rem;
            font-size: 1.4rem;
        }

        .modal-content input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: #151515;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #FF650D;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-save {
            background-color: #3498db;
            color: white;
            padding: 0.6rem 1.2rem;
        }
        .modal-save:hover { 
            background-color: #2980b9; 
        }

        .modal-cancel {
            background-color: transparent;
            color: #ff4757;
            border: 1px solid #ff4757;
            padding: 0.6rem 1.2rem;
        }
        .modal-cancel:hover { 
            background-color: #ff4757; color: white; 
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Task Tracker</h2>
        </div>
        <div class="input-section">
            <div class="row1">
                <input type="text" placeholder="Enter a new task..." id="taskenter" name="taskenter">
                <button class="add">ADD</button>
            </div>
            <button class="clear">Clear All Tasks</button>
        </div>
        <div class="task-section">
            </div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h3>Edit Task</h3>
            <input type="text" id="modalInput">
            <div class="modal-buttons">
                <button class="modal-cancel" id="cancelBtn">Cancel</button>
                <button class="modal-save" id="saveBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        let input = document.querySelector("#taskenter");
        let add = document.querySelector(".add");
        let clear = document.querySelector(".clear");
        let tasksContainer = document.querySelector(".task-section");
        
        let editModal = document.getElementById('editModal');
        let modalInput = document.getElementById('modalInput');
        let saveBtn = document.getElementById('saveBtn');
        let cancelBtn = document.getElementById('cancelBtn');
        let currentEditIndex = null;
        
        let array = JSON.parse(localStorage.getItem('textArray')) || [];

        function saveTasks() {
            localStorage.setItem('textArray', JSON.stringify(array));
        }

        function renderTasks() {
            tasksContainer.innerHTML = ""; 
            
            if (array.length === 0) return;

            array.forEach((item, index) => {
                let task = document.createElement('div');
                task.className = 'task';

                let text = document.createElement('p');
                text.className = item.done ? 'textnote done-text' : 'textnote';
                text.innerText = item.value;

                let buttonsContainer = document.createElement('div');
                buttonsContainer.className = 'buttons';

                if (!item.done) {
                    let btnDone = document.createElement('button');
                    btnDone.className = 'done';
                    btnDone.innerText = "Done";
                    btnDone.dataset.index = index; 
                    buttonsContainer.appendChild(btnDone);

                    let btnEdit = document.createElement('button');
                    btnEdit.className = 'edit';
                    btnEdit.innerText = "Edit";
                    btnEdit.dataset.index = index; 
                    buttonsContainer.appendChild(btnEdit);
                }

                let btnDelete = document.createElement('button');
                btnDelete.className = 'delete';
                btnDelete.innerText = "Delete";
                btnDelete.dataset.index = index; 
                buttonsContainer.appendChild(btnDelete);

                task.appendChild(text);
                task.appendChild(buttonsContainer);
                tasksContainer.appendChild(task);
            });
        }

        renderTasks();

        add.addEventListener('click', () => {
            if (input.value.trim() === "") return; 
            
            array.push({ value: input.value.trim(), done: false });
            saveTasks();
            renderTasks();
            input.value = ""; 
        });

        clear.addEventListener('click', () => {
            array = []; 
            saveTasks(); 
            renderTasks(); 
        });

        tasksContainer.addEventListener('click', (event) => {
            if (event.target.classList.contains('delete')) {
                let index = event.target.dataset.index;
                array.splice(index, 1); 
                saveTasks();
                renderTasks();
            }
            
            if (event.target.classList.contains('done')) {
                let index = event.target.dataset.index;
                array[index].done = true; 
                saveTasks();
                renderTasks();
            }

            if (event.target.classList.contains('edit')) {
                currentEditIndex = event.target.dataset.index;
                modalInput.value = array[currentEditIndex].value;
                editModal.classList.add('active');
                modalInput.focus();
            }
        });

        saveBtn.addEventListener('click', () => {
            if (modalInput.value.trim() !== "") {
                array[currentEditIndex].value = modalInput.value.trim();
                saveTasks();
                renderTasks();
                editModal.classList.remove('active');
            }
        });

        cancelBtn.addEventListener('click', () => {
            editModal.classList.remove('active');
        });

        editModal.addEventListener('click', (event) => {
            if (event.target === editModal) {
                editModal.classList.remove('active');
            }
        });

        input.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                add.click();
            }
        });

        modalInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                saveBtn.click();
            }
        });
    </script>
</body>
</html>
